<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="116" y="196" width="280" height="200" rx="32" fill="white" opacity="0.95"/>
  <!-- Camera top bump (viewfinder) -->
  <rect x="196" y="164" width="80" height="48" rx="12" fill="white" opacity="0.95"/>
  <!-- Lens outer ring -->
  <circle cx="256" cy="296" r="72" fill="none" stroke="#f97316" stroke-width="12"/>
  <!-- Lens inner -->
  <circle cx="256" cy="296" r="44" fill="#f97316" opacity="0.85"/>
  <!-- Lens shine -->
  <circle cx="240" cy="280" r="14" fill="white" opacity="0.6"/>
  <!-- Flash dot -->
  <circle cx="340" cy="220" r="12" fill="#fbbf24"/>
  <!-- Sparkle top-right -->
  <g transform="translate(400, 120)" fill="#fbbf24">
    <rect x="-4" y="-20" width="8" height="40" rx="4"/>
    <rect x="-20" y="-4" width="40" height="8" rx="4"/>
  </g>
  <!-- Sparkle bottom-left -->
  <g transform="translate(100, 400)" fill="#fbbf24" opacity="0.7">
    <rect x="-3" y="-14" width="6" height="28" rx="3"/>
    <rect x="-14" y="-3" width="28" height="6" rx="3"/>
  </g>
</svg>
